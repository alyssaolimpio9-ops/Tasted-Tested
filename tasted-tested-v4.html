<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasted & Tested — Brand Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#f5f2ec;--parchment:#faf8f4;--dark:#1c1917;--dark2:#292524;
  --mid:#57534e;--muted:#a8a29e;--border:#e7e4dd;
  --blue:#2563eb;--blue2:#1d4ed8;--white:#fff;
  --shad:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shad-md:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shad-lg:0 20px 48px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark)}
.lcard{background:var(--parchment);border-radius:20px;padding:52px 44px;width:100%;max-width:420px;text-align:center;box-shadow:var(--shad-lg)}
.lcard img{height:52px;object-fit:contain;margin-bottom:28px}
.lcard h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin-bottom:6px}
.lcard p{color:var(--muted);font-size:14px;margin-bottom:32px}
.lcard input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:var(--white);margin-bottom:14px;transition:border-color .2s}
.lcard input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.lcard .sbtn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer}
.lcard .sbtn:hover{background:var(--blue2)}
.lerr{color:#dc2626;font-size:13px;margin-top:12px;display:none}

#app{display:none;min-height:100vh}
.app-header{background:var(--dark);padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hbrand img{height:34px;object-fit:contain}
.hright{display:flex;align-items:center;gap:12px}
.btn-add-h{padding:9px 20px;background:var(--blue);color:white;border:none;border-radius:9px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}
.btn-add-h:hover{background:var(--blue2)}
.btn-lo{padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-family:inherit;font-size:13px;cursor:pointer}
.btn-lo:hover{border-color:rgba(255,255,255,.35);color:white}

.stats-bar{background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);padding:20px 32px;display:flex;gap:40px}
.stat .sv{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:var(--white);line-height:1}
.stat .sl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

.toolbar{padding:20px 32px;background:var(--parchment);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:220px}
.sw svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sw input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--white)}
.sw input:focus{outline:none;border-color:var(--blue)}
.tb-sel{padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--white);cursor:pointer}
.tb-sel:focus{outline:none;border-color:var(--blue)}
.btn-exp{padding:10px 16px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--white);cursor:pointer;color:var(--mid);display:flex;align-items:center;gap:6px}
.btn-exp:hover{border-color:var(--blue);color:var(--blue)}

.loading-bar{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px}
.loading-bar .spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

.blist{max-width:960px;margin:28px auto;padding:0 24px}
.bcard{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.bcard:hover{box-shadow:var(--shad-md);border-color:#d4cfc8}
.crow{display:flex;align-items:center;padding:18px 22px;gap:16px;cursor:pointer;user-select:none}
.cname-block{flex:1;min-width:0}
.cname{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ccat{font-size:13px;color:var(--muted);margin-top:2px}
.cstars{flex-shrink:0;display:flex;gap:3px}
.star{width:18px;height:18px;cursor:pointer;color:#d4cfc8;transition:color .15s,transform .1s;flex-shrink:0}
.star.on{color:#f59e0b}
.star:hover{transform:scale(1.15)}
.ctoggle{flex-shrink:0;color:var(--muted);font-size:12px;width:24px;text-align:center}

.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:1px solid currentColor}
.b-confirmed{color:#166534;background:#f0fdf4;border-color:#bbf7d0}
.b-received{color:#92400e;background:#fffbeb;border-color:#fde68a}
.b-sent{color:#1e40af;background:#eff6ff;border-color:#bfdbfe}
.b-interested{color:#5b21b6;background:#f5f3ff;border-color:#ddd6fe}
.b-inquired{color:#374151;background:#f9fafb;border-color:#e5e7eb}
.b-tasted{color:#065f46;background:#ecfdf5;border-color:#a7f3d0}
.b-feedback{color:#831843;background:#fdf2f8;border-color:#fbcfe8}
.b-posted{color:#065f46;background:#d1fae5;border-color:#6ee7b7}
.b-needspost{color:#9a3412;background:#fff7ed;border-color:#fed7aa}
.b-other{color:var(--mid);background:var(--cream);border-color:var(--border)}

.cexpand{border-top:1px solid var(--border);background:var(--parchment);padding:20px 22px}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:16px}
.efl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.efv{font-size:14px;color:var(--dark)}
.eacts{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border)}
.btn-edit-c{padding:8px 18px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;background:var(--white);font-weight:500}
.btn-edit-c:hover{border-color:var(--blue);color:var(--blue)}
.btn-del-c{padding:8px 18px;border:1.5px solid #fecaca;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;background:var(--white);color:#dc2626;font-weight:500}
.btn-del-c:hover{background:#fef2f2;border-color:#dc2626}

.empty{text-align:center;padding:72px 24px;color:var(--muted)}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--dark);margin-bottom:8px}

.mo{display:none;position:fixed;inset:0;background:rgba(28,25,23,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.mo.open{display:flex}
.modal{background:var(--parchment);border-radius:18px;padding:36px 36px 28px;width:100%;max-width:600px;box-shadow:var(--shad-lg);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mhead{margin-bottom:28px}
.mhead h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600}
.mhead p{color:var(--muted);font-size:13px;margin-top:4px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ffull{grid-column:1/-1}
.fg{display:flex;flex-direction:column}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);margin-bottom:6px}
.fg input,.fg select,.fg textarea{padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--white);transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:72px}
.flabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);display:block;margin-bottom:10px}
.sr-wrap{display:flex;gap:6px;margin-bottom:16px}
.sr{font-size:28px;color:#d4cfc8;cursor:pointer;transition:color .15s,transform .1s;user-select:none;line-height:1}
.sr.on{color:#f59e0b}
.sr:hover{transform:scale(1.1)}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .15s;font-family:inherit}
.pill.on{border-color:var(--dark);background:var(--dark);color:white}
.cbox{border:1.5px solid var(--border);border-radius:10px;padding:16px;background:var(--white);display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.cbox .cbox-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mid)}
.cbox input{padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--cream)}
.cbox input:focus{outline:none;border-color:var(--blue);background:var(--white)}
.mfoot{display:flex;align-items:center;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.btn-mdel{padding:10px 18px;border:1.5px solid #fecaca;border-radius:9px;font-size:14px;font-family:inherit;cursor:pointer;background:#fff5f5;color:#dc2626;font-weight:500}
.btn-mdel:hover{background:#fef2f2;border-color:#dc2626}
.btn-mcancel{padding:10px 20px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;cursor:pointer;background:var(--white)}
.btn-msave{padding:10px 24px;background:var(--blue);color:white;border:none;border-radius:9px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}
.btn-msave:hover{background:var(--blue2)}
@media(max-width:640px){
  .stats-bar{gap:20px;padding:16px 20px}.stat .sv{font-size:28px}
  .toolbar{padding:14px 16px}.blist{padding:0 12px;margin-top:16px}
  .frow{grid-template-columns:1fr}.modal{padding:24px 20px 20px}
  .app-header{padding:0 16px}.crow{gap:10px;padding:14px 16px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <img id="logo1" alt="Tasted and Tested">
    <h2>Brand Tracker</h2>
    <p>Private workspace &middot; Tasted &amp; Tested</p>
    <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password">
    <button class="sbtn" id="sign-btn">Sign In</button>
    <div class="lerr" id="lerr">Incorrect password &mdash; try again.</div>
  </div>
</div>

<div id="app">
  <header class="app-header">
    <div class="hbrand"><img id="logo2" alt="T&T"></div>
    <div class="hright">
      <button class="btn-add-h" id="btn-add">+ Add Brand</button>
      <button class="btn-lo" id="btn-lo">Log out</button>
    </div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="sv" id="s-total">—</div><div class="sl">Total Brands</div></div>
    <div class="stat"><div class="sv" id="s-posted">—</div><div class="sl">Posted</div></div>
    <div class="stat"><div class="sv" id="s-tasted">—</div><div class="sl">Tasted</div></div>
    <div class="stat"><div class="sv" id="s-received">—</div><div class="sl">Received</div></div>
  </div>
  <div class="toolbar">
    <div class="sw">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="Search brands...">
    </div>
    <select class="tb-sel" id="fc"><option value="">All Categories</option><option>Beverage</option><option>Snacks</option><option>Sweets</option><option>Breakfast</option><option>Pantry Staple</option><option>Wellness</option><option>Dairy</option><option>Protein</option><option>Other</option></select>
    <select class="tb-sel" id="fs"><option value="">All Statuses</option><option>Confirmed Partner</option><option>Received</option><option>Sent Samples</option><option>Interested</option><option>Inquired</option><option>Tasted</option><option>Feedback Sent</option><option>Posted</option><option>Needs Feedback</option><option>Needs Post + Feedback</option></select>
    <select class="tb-sel" id="fo"><option value="">All Owners</option><option>Alyssa</option><option>Katie</option></select>
    <select class="tb-sel" id="fsort"><option value="name">Sort: Name</option><option value="rating">Sort: Rating</option><option value="status">Sort: Status</option><option value="category">Sort: Category</option></select>
    <button class="btn-exp" id="btn-export">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>
  <div id="loading" class="loading-bar"><div class="spinner"></div><br>Loading your brands...</div>
  <div class="blist" id="blist" style="display:none"></div>
  <div class="empty" id="empty" style="display:none"><h3>No brands found</h3><p>Try adjusting your search or filters</p></div>
</div>

<div class="mo" id="mo">
  <div class="modal">
    <div class="mhead"><h2 id="mtitle">Add Brand</h2><p id="msub">Fill in the details below</p></div>
    <div class="frow"><div class="fg ffull"><label>Brand Name *</label><input id="fn" type="text" placeholder="e.g. Better Sour Candy"></div></div>
    <div class="frow">
      <div class="fg"><label>Category</label><select id="fcat"><option value="">Select...</option><option>Beverage</option><option>Snacks</option><option>Sweets</option><option>Breakfast</option><option>Pantry Staple</option><option>Wellness</option><option>Dairy</option><option>Protein</option><option>Other</option></select></div>
      <div class="fg"><label>Status</label><select id="fst"><option>Received</option><option>Sent Samples</option><option>Interested</option><option>Inquired</option><option>Confirmed Partner</option><option>Tasted</option><option>Needs Feedback</option><option>Feedback Sent</option><option>Needs Post + Feedback</option><option>Posted</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Owner</label><select id="fown"><option value="">—</option><option>Alyssa</option><option>Katie</option><option>Both</option></select></div>
      <div class="fg"><label>Description</label><input id="fdesc" type="text" placeholder="Brief product description"></div>
    </div>
    <div style="margin-bottom:16px">
      <span class="flabel">Rating</span>
      <div class="sr-wrap" id="srwrap">
        <span class="sr" data-v="1">&#9733;</span><span class="sr" data-v="2">&#9733;</span>
        <span class="sr" data-v="3">&#9733;</span><span class="sr" data-v="4">&#9733;</span>
        <span class="sr" data-v="5">&#9733;</span>
      </div>
    </div>
    <div class="frow"><div class="fg ffull"><label>Feedback Given</label><textarea id="ffb" placeholder="What feedback did you share?"></textarea></div></div>
    <div style="margin-bottom:16px">
      <span class="flabel">Platforms Posted On</span>
      <div class="pills" id="ppills">
        <button class="pill" data-p="Instagram">Instagram</button>
        <button class="pill" data-p="Substack">Substack</button>
        <button class="pill" data-p="LinkedIn">LinkedIn</button>
        <button class="pill" data-p="TikTok">TikTok</button>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>Date Received</label><input id="fdr" type="date"></div>
      <div class="fg"><label>Date Tasted</label><input id="fdt" type="date"></div>
    </div>
    <div class="cbox">
      <span class="cbox-label">Contact Info</span>
      <input id="fcn" type="text" placeholder="Contact name">
      <input id="fce" type="email" placeholder="Email">
      <input id="fcig" type="text" placeholder="@instagram handle">
    </div>
    <div class="fg"><label>Comments / Notes</label><textarea id="fcom" placeholder="Any notes or follow-ups..."></textarea></div>
    <div class="mfoot">
      <button class="btn-mdel" id="btn-mdel" style="display:none">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-mcancel" id="btn-mcancel">Cancel</button>
      <button class="btn-msave" id="btn-msave">Save Brand</button>
    </div>
  </div>
</div>

<script>

  document.getElementById('btn-add').addEventListener('click', () => openModal(null));
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-mcancel').addEventListener('click', closeModal);
  document.getElementById('btn-msave').addEventListener('click', saveBrand);
  document.getElementById('btn-mdel').addEventListener('click', deleteFromModal);
  document.getElementById('mo').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
  ['q','fc','fs','fo','fsort'].forEach(id => document.getElementById(id).addEventListener('change', render));
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('srwrap').addEventListener('click', e => {
    const s = e.target.closest('.sr');
    if(s){ rating = (rating===parseInt(s.dataset.v))?0:parseInt(s.dataset.v); updateStars(); }
  });
  document.getElementById('ppills').addEventListener('click', e => {
    const p = e.target.closest('.pill');
    if(p) p.classList.toggle('on');
  });

  // ── AUTH ──
  function doLogin() {
    if (document.getElementById('pw').value === PW) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadBrands();
    } else {
      document.getElementById('lerr').style.display = 'block';
    }
  }
  function doLogout() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw').value = '';
    brands = []; expanded = null;
  }

  // ── SUPABASE ──
  async function sbReq(method, path, body) {
    const r = await fetch(SB_URL + '/rest/v1/' + path, {
      method,
      headers: {
        'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': method==='POST' ? 'return=representation' : ''
      },
      body: body ? JSON.stringify(body) : undefined
    });
    const t = await r.text();
    return t ? JSON.parse(t) : null;
  }

  async function loadBrands() {
    showLoading(true);
    let loaded = false;

    // 1. Try Supabase
    try {
      const timeout = new Promise((_,rej) => setTimeout(()=>rej('timeout'), 8000));
      const data = await Promise.race([sbReq('GET', 'brands?order=name'), timeout]);
      if (Array.isArray(data) && data.length > 0) {
        brands = data;
        saveLocal(brands);
        loaded = true;
      }
    } catch(e) { console.warn('Supabase load failed:', e); }

    // 2. If Supabase empty/failed, try localStorage cache
    if (!loaded) {
      const cached = loadLocal();
      if (cached && cached.length > 0) {
        brands = cached;
        loaded = true;
        // Try to push to Supabase in background
        pushSeedToDB(brands);
      }
    }

    // 3. Last resort: use embedded SEED data
    if (!loaded) {
      brands = SEED.map(b => Object.assign({}, b));
      saveLocal(brands);
      pushSeedToDB(brands);
    }

    showLoading(false);
    render();
  }

  async function pushSeedToDB(data) {
    try {
      // First clear existing (in case of stale data)
      for (let i = 0; i < data.length; i += 50) {
        await sbReq('POST', 'brands?on_conflict=id', data.slice(i, i+50).map(cleanB));
      }
      console.log('Synced to Supabase');
    } catch(e) { console.warn('Supabase sync failed:', e); }
  }

  async function saveB(b) {
    // Update localStorage immediately
    const idx = brands.findIndex(x => x.id === b.id);
    if (idx > -1) brands[idx] = b; else brands.push(b);
    saveLocal(brands);
    // Try Supabase
    try { await sbReq('POST', 'brands?on_conflict=id', [cleanB(b)]); } catch(e) {}
  }

  async function delB(id) {
    brands = brands.filter(b => b.id !== id);
    saveLocal(brands);
    try { await sbReq('DELETE', 'brands?id=eq.'+encodeURIComponent(id)); } catch(e) {}
  }

  function cleanB(b) {
    return {
      id: b.id||'', name: b.name||'', category: b.category||'',
      description: b.description||'', rating: parseInt(b.rating)||0,
      feedback_given: b.feedback_given||'', platforms: b.platforms||[],
      contact_name: b.contact_name||'', contact_email: b.contact_email||'',
      contact_instagram: b.contact_instagram||'', comments: b.comments||'',
      date_received: b.date_received||'', date_tasted: b.date_tasted||'',
      status: b.status||'Received', owner: b.owner||''
    };
  }

  // ── LOCAL STORAGE (backup) ──
  function saveLocal(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadLocal() {
    try { const d = localStorage.getItem(LS_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
  }

  function showLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('blist').style.display = on ? 'none' : 'block';
  }

  // ── RENDER ──
  function badgeCls(s) {
    s = (s||'').toLowerCase();
    if (s.includes('confirmed')) return 'b-confirmed';
    if (s==='tasted') return 'b-tasted';
    if (s==='posted') return 'b-posted';
    if (s.includes('needs post')) return 'b-needspost';
    if (s.includes('needs') || s.includes('feedback sent')) return 'b-feedback';
    if (s.includes('received')) return 'b-received';
    if (s.includes('sent samples')) return 'b-sent';
    if (s.includes('interested')) return 'b-interested';
    if (s.includes('inquired')) return 'b-inquired';
    return 'b-other';
  }

  function starSVG(on, id, v) {
    return '<svg class="star'+(on?' on':'')+'" data-id="'+id+'" data-v="'+v+'" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';
  }

  function escH(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const q = (document.getElementById('q').value||'').toLowerCase();
    const cat = document.getElementById('fc').value;
    const status = document.getElementById('fs').value;
    const owner = document.getElementById('fo').value;
    const sort = document.getElementById('fsort').value;

    let list = brands.filter(b => {
      if(q && !((b.name||'')+(b.description||'')+(b.comments||'')).toLowerCase().includes(q)) return false;
      if(cat && b.category!==cat) return false;
      if(status && b.status!==status) return false;
      if(owner && b.owner!==owner) return false;
      return true;
    });
    list.sort((a,b) => {
      if(sort==='rating') return (parseInt(b.rating)||0)-(parseInt(a.rating)||0);
      if(sort==='status') return (a.status||'').localeCompare(b.status||'');
      if(sort==='category') return (a.category||'').localeCompare(b.category||'');
      return (a.name||'').localeCompare(b.name||'');
    });

    document.getElementById('s-total').textContent = brands.length;
    document.getElementById('s-posted').textContent = brands.filter(b=>(b.status||'')==='Posted').length;
    document.getElementById('s-tasted').textContent = brands.filter(b=>(b.status||'')==='Tasted').length;
    document.getElementById('s-received').textContent = brands.filter(b=>(b.status||'')==='Received').length;

    const container = document.getElementById('blist');
    const emptyEl = document.getElementById('empty');

    if(!list.length){ container.innerHTML=''; emptyEl.style.display='block'; return; }
    emptyEl.style.display='none';

    container.innerHTML = '';
    list.forEach(b => {
      const r = parseInt(b.rating)||0;
      const starsHtml = [1,2,3,4,5].map(i => starSVG(i<=r, b.id, i)).join('');
      const isOpen = expanded===b.id;

      let expandHtml = '';
      if(isOpen) {
        const contact = [b.contact_name,b.contact_email,b.contact_instagram].filter(Boolean).join(' · ') || '—';
        const plat = (b.platforms||[]).join(', ') || '—';
        expandHtml = '<div class="cexpand"><div class="egrid">' +
          (b.description?'<div><div class="efl">Description</div><div class="efv">'+escH(b.description)+'</div></div>':'') +
          '<div><div class="efl">Owner</div><div class="efv">'+escH(b.owner||'—')+'</div></div>' +
          '<div><div class="efl">Platforms</div><div class="efv">'+escH(plat)+'</div></div>' +
          (b.feedback_given?'<div><div class="efl">Feedback Given</div><div class="efv">'+escH(b.feedback_given)+'</div></div>':'') +
          (b.date_received?'<div><div class="efl">Date Received</div><div class="efv">'+escH(b.date_received)+'</div></div>':'') +
          '<div><div class="efl">Contact</div><div class="efv">'+escH(contact)+'</div></div>' +
          (b.comments?'<div style="grid-column:1/-1"><div class="efl">Comments</div><div class="efv">'+escH(b.comments)+'</div></div>':'') +
          '</div><div class="eacts">' +
          '<button class="btn-edit-c" data-edit="'+escH(b.id)+'">&#9999;&#65039; Edit Brand</button>' +
          '<button class="btn-del-c" data-del="'+escH(b.id)+'">Delete</button>' +
          '</div></div>';
      }

      const card = document.createElement('div');
      card.className = 'bcard';
      card.id = 'card-'+b.id;
      card.innerHTML =
        '<div class="crow" data-toggle="'+escH(b.id)+'">' +
          '<div class="cname-block"><div class="cname">'+escH(b.name)+'</div><div class="ccat">'+escH(b.category||'')+'</div></div>' +
          '<div><span class="badge '+badgeCls(b.status)+'">'+escH(b.status||'—')+'</span></div>' +
          '<div class="cstars" data-stars="'+escH(b.id)+'">'+starsHtml+'</div>' +
          '<div class="ctoggle">'+(isOpen?'&#9650;':'&#8212;')+'</div>' +
        '</div>'+expandHtml;
      container.appendChild(card);
    });

    container.onclick = function(e) {
      const star = e.target.closest('.star');
      if(star){ e.stopPropagation(); const id=star.dataset.id,v=parseInt(star.dataset.v),b=brands.find(x=>x.id===id); if(b){b.rating=(b.rating===v)?0:v;render();saveB(b);} return; }
      const eb = e.target.closest('[data-edit]');
      if(eb){ openModal(eb.dataset.edit); return; }
      const db = e.target.closest('[data-del]');
      if(db){ confirmDel(db.dataset.del,false); return; }
      const row = e.target.closest('[data-toggle]');
      if(row){ expanded=(expanded===row.dataset.toggle)?null:row.dataset.toggle; render(); }
    };
  }

  // ── MODAL ──
  function openModal(id) {
    editId = id||null;
    const b = id ? brands.find(x=>x.id===id) : null;
    document.getElementById('mtitle').textContent = id?'Edit Brand':'Add Brand';
    document.getElementById('msub').textContent = b?b.name:'Fill in the details below';
    document.getElementById('fn').value = b?(b.name||''):'';
    document.getElementById('fcat').value = b?(b.category||''):'';
    document.getElementById('fst').value = b?(b.status||'Received'):'Received';
    document.getElementById('fown').value = b?(b.owner||''):'';
    document.getElementById('fdesc').value = b?(b.description||''):'';
    document.getElementById('ffb').value = b?(b.feedback_given||''):'';
    document.getElementById('fcn').value = b?(b.contact_name||''):'';
    document.getElementById('fce').value = b?(b.contact_email||''):'';
    document.getElementById('fcig').value = b?(b.contact_instagram||''):'';
    document.getElementById('fdr').value = b?(b.date_received||''):'';
    document.getElementById('fdt').value = b?(b.date_tasted||''):'';
    document.getElementById('fcom').value = b?(b.comments||''):'';
    document.getElementById('btn-mdel').style.display = id?'block':'none';
    rating = b?(parseInt(b.rating)||0):0;
    updateStars();
    const plats = b?(b.platforms||[]):[];
    document.querySelectorAll('#ppills .pill').forEach(p => p.classList.toggle('on', plats.includes(p.dataset.p)));
    document.getElementById('mo').classList.add('open');
    setTimeout(()=>document.getElementById('fn').focus(),50);
  }

  function closeModal(){ document.getElementById('mo').classList.remove('open'); editId=null; rating=0; }
  function updateStars(){ document.querySelectorAll('#srwrap .sr').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.v)<=rating)); }

  async function saveBrand() {
    const name = document.getElementById('fn').value.trim();
    if(!name){ alert('Brand name is required'); return; }
    const plats = Array.from(document.querySelectorAll('#ppills .pill.on')).map(p=>p.dataset.p);
    const b = {
      id: editId||('b'+Date.now()), name,
      category: document.getElementById('fcat').value,
      status: document.getElementById('fst').value,
      owner: document.getElementById('fown').value,
      rating, description: document.getElementById('fdesc').value,
      feedback_given: document.getElementById('ffb').value, platforms: plats,
      contact_name: document.getElementById('fcn').value,
      contact_email: document.getElementById('fce').value,
      contact_instagram: document.getElementById('fcig').value,
      date_received: document.getElementById('fdr').value,
      date_tasted: document.getElementById('fdt').value,
      comments: document.getElementById('fcom').value
    };
    const i = brands.findIndex(x=>x.id===b.id);
    if(i>-1) brands[i]=b; else brands.push(b);
    closeModal(); render();
    await saveB(b);
  }

  function deleteFromModal(){ if(editId) confirmDel(editId,true); }
  async function confirmDel(id,fromModal) {
    if(!confirm('Delete this brand? This cannot be undone.')) return;
    brands = brands.filter(b=>b.id!==id);
    if(expanded===id) expanded=null;
    if(fromModal) closeModal();
    render(); await delB(id);
  }

  function exportCSV() {
    const cols = ['name','category','status','owner','rating','description','feedback_given','platforms','contact_name','contact_email','contact_instagram','comments','date_received','date_tasted'];
    const rows = [cols.join(','),...brands.map(b=>cols.map(c=>'"'+String(Array.isArray(b[c])?b[c].join(';'):(b[c]||'')).replace(/"/g,'""')+'"').join(','))];
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n'));
    a.download = 'tasted-tested-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  }
})();
</script>
